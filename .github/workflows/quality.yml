name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app:
    name: App checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile
        run: npm run mobile:typecheck

      - name: Typecheck web
        run: npm run web:typecheck

      - name: Lint mobile
        run: npm run mobile:lint

      - name: Lint web
        run: npm run web:lint

      - name: Check Vercel API mirrors
        run: npm run web:api-mirrors:check

      - name: Test Vercel API handlers
        run: npm run api:test

      - name: Verify backup/restore release surface
        run: npm run backup-restore:gate

      - name: Check web release security
        run: npm run security:check

      - name: SMS production policy tests
        run: npm run mobile:test:capture
