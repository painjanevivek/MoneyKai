name: MoneyKai Flutter Android

on:
  pull_request:
    paths:
      - ".github/workflows/moneykai-flutter-android.yml"
      - "apps/MoneyKai-flutter/**"
      - "docs/flutter-*.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/moneykai-flutter-android.yml"
      - "apps/MoneyKai-flutter/**"
      - "docs/flutter-*.md"

jobs:
  android:
    name: Analyze, test, build, and audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/MoneyKai-flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.4"
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Audit iOS project config
        shell: pwsh
        run: ./tool/audit_ios_project.ps1

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build unsigned release APK
        run: flutter build apk --release

      - name: Build unsigned release AAB
        run: flutter build appbundle --release

      - name: Audit Android artifacts
        shell: pwsh
        run: ./tool/audit_android_release.ps1
