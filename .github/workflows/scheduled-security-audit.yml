name: Scheduled security audit

on:
  schedule:
    # Monday 09:47 Asia/Kolkata (04:17 UTC).
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

# Preserve every scheduled result for security-history visibility.
concurrency:
  group: scheduled-security-audit
  cancel-in-progress: false

env:
  CI: true

jobs:
  application-security:
    name: Application security baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Verify the OWASP security baseline
        run: npm run security:check

      - name: Run API security regression tests
        run: npm run api:test

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production and development dependencies
        run: node scripts/audit-npm-dependencies.mjs
